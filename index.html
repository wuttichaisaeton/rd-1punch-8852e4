<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#efe7d6">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noimageindex">
<meta name="robots" content="noai, noimageai">
<title>Kitchen by Rough Design</title>
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<!-- Firebase (RTDB only) — powers the editable detail callouts (เอ๋ 2026-07-15).
     Classic scripts (NOT type=module) so build-viewer.mjs leaves them untouched;
     they run before the app module, so window.coDB is ready by the time the GLB
     loads. Keys are public — writes are gated client-side (isAdmin) + RTDB rules. -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script>

      apiKey: "AIzaSyCQ0VmVJji2ClRa3JU5U0gQDRi_bAMfTxM",
      authDomain: "kitchen-drawings.firebaseapp.com",
      databaseURL: "https://kitchen-drawings-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kitchen-drawings",
      storageBucket: "kitchen-drawings.firebasestorage.app",
      messagingSenderId: "297989743081",
      appId: "1:297989743081:web:f255b4cdc8cd68dff56b78"
    });
    window.coDB = firebase.database();
  } catch (e) {}
</script>
<style>
  /* ── Flux Architect (brand font, matches the drawings) ── */
  @font-face{font-family:'Flux Architect';src:url('./fonts/Flux Architect Regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:'Flux Architect';src:url('./fonts/Flux Architect Bold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap}
  @font-face{font-family:'Flux Architect';src:url('./fonts/Flux Architect Italic.ttf') format('truetype');font-weight:400;font-style:italic;font-display:swap}
  @font-face{font-family:'Flux Architect';src:url('./fonts/Flux Architect Bold Italic.ttf') format('truetype');font-weight:700;font-style:italic;font-display:swap}

  :root{
    --paper:#efe7d6; --paper2:#f7f2e7; --ink:#000; --ink-soft:#333;
    --pen:#000; --faint:#c7bda6; --accent:#b23a2b;
    --pen-sh:2px 2px 0 rgba(27,24,21,.20);
    --wob:16px 22px 14px 20px/20px 14px 22px 16px;
    --wob2:9px 13px 7px 11px/11px 7px 13px 9px;
    --fx:'Flux Architect',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--paper); color:var(--ink); font-family:var(--fx); overflow:hidden; -webkit-font-smoothing:antialiased}
  /* aged-paper vignette (from the web sketch theme) */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:8;
    background:radial-gradient(130% 120% at 50% 42%,transparent 58%,rgba(70,55,30,.20) 100%);mix-blend-mode:multiply}

  .stage{position:fixed;inset:0}
  /* ortho-mode PAN catcher — sits over the model (above mv z1, below the UI z5)
     ONLY while an elevation/plan face is snapped, so 1-finger drag pans instead of
     model-viewer's built-in orbit (เอ๋ 2026-07-15). Hidden in orbit/home mode. */
  #panCatch{position:absolute;inset:0;z-index:3;display:none;touch-action:none;cursor:grab}
  #panCatch.on{display:block} #panCatch.on:active{cursor:grabbing}
  model-viewer{position:absolute;inset:0;width:100%;height:100%;z-index:1;
    background:var(--paper); --poster-color:var(--paper);
    --progress-bar-color:var(--accent); --progress-bar-height:3px}

  /* ── drawn card helper ── */
  .card{background:var(--paper2);border:2px solid var(--pen);box-shadow:var(--pen-sh);border-radius:var(--wob2)}

  /* ── top: brand · project ── */
  .top{position:absolute;z-index:5;top:0;left:0;right:0;display:flex;justify-content:space-between;
    align-items:flex-start;padding:clamp(14px,3vw,26px);pointer-events:none;gap:12px;animation:fade .7s .1s both}
  .brand{line-height:1}
  .brand .mark{font-size:clamp(16px,2vw,21px);color:var(--ink)}
  .brand .mark span{font-weight:400;opacity:.7} .brand .mark b{font-weight:700}
  .brand .rule{margin-top:6px;height:6px;width:70px;background:repeating-linear-gradient(-52deg,var(--accent) 0 2px,transparent 2px 5px)}
  .brand small{display:block;margin-top:8px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);font-style:italic}
  .proj{text-align:right;max-width:60%}
  .proj .name{font-size:clamp(20px,3.2vw,32px);font-weight:700;text-transform:uppercase;letter-spacing:.02em;
    color:var(--paper2);-webkit-text-stroke:1.1px var(--pen);text-shadow:2px 2px 0 var(--pen),4px 4px 0 rgba(27,24,21,.18);word-break:break-word}
  .proj .tag{margin-top:6px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:700}

  /* ── dimensions plate (bottom-left, lifted above the view-cube) ── */
  .dimwrap{position:absolute;z-index:5;left:clamp(14px,3vw,26px);bottom:calc(clamp(16px,3vw,26px) + 178px);
    display:flex;flex-direction:column;align-items:flex-start;gap:9px;animation:rise .7s .3s both}
  .dims{display:flex;overflow:hidden}
  .dims div{padding:9px 15px 8px;min-width:78px;border-right:2px solid var(--pen)}
  .dims div:last-child{border-right:0}
  .dims .k{font-size:9px;letter-spacing:.2em;color:var(--ink-soft);text-transform:uppercase}
  .dims .v{display:flex;align-items:baseline;margin-top:2px}
  .dims .v .dv{font-family:var(--fx);font-size:16px;font-weight:700;color:var(--ink);
    background:transparent;border:0;width:52px;padding:0;outline:none;pointer-events:none;
    appearance:textfield;-moz-appearance:textfield;-webkit-touch-callout:none}
  .dims .v .dv::-webkit-outer-spin-button,.dims .v .dv::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .dims .v span{font-size:10px;color:var(--ink-soft);margin-left:3px}
  .dims.editing .v .dv{pointer-events:auto;border-bottom:2px dashed var(--accent);cursor:text}
  .dims.editing .v .dv:focus{border-bottom-style:solid}
  /* :not(.show) beats the later `.btn{display:inline-flex}` (0-2-0 > 0-1-0) —
     plain `.dimcopy` lost to it and the button showed for EVERYONE */
  .dimcopy:not(.show){display:none} .dimcopy.show{display:inline-flex}
  .dimcopy .ok{color:var(--accent);font-weight:700;margin-left:6px;opacity:0;transition:opacity .2s}
  .dimcopy .ok.show{opacity:1}
  .btn.icon{padding:11px 12px}

  /* (3D dimension callouts removed — เอ๋ 2026-07-09 "เอาป้ายออกทั้งหมด") */

  /* ── view-cube (bottom-left, mirrors the workshop app's .kd3d-viewcube but in
        the pencil theme): tap a face = snap that view + dimension lines; drag =
        orbit; house = home isometric ── */
  .vcube{position:absolute;z-index:5;left:clamp(14px,3vw,26px);bottom:clamp(16px,3vw,26px);
    width:132px;height:172px;cursor:grab;touch-action:none;-webkit-tap-highlight-color:transparent;animation:fade .7s .5s both}
  .vcube.drag{cursor:grabbing}
  .vcube .vc-home{position:absolute;left:0;top:34px;z-index:6;display:inline-flex;align-items:center;justify-content:center;
    width:42px;height:42px;padding:0;background:transparent;border:none;color:var(--ink);cursor:pointer;-webkit-tap-highlight-color:transparent}
  .vcube .vc-home:hover{color:var(--accent);transform:scale(1.1)}
  .vcube .vc-home:active{transform:scale(.9)}
  .vcube .vc-home svg{width:30px;height:30px;display:block;filter:drop-shadow(1.5px 1.5px 0 rgba(27,24,21,.25))}
  .vcube .vc-scene{position:absolute;left:0;right:0;top:42px;bottom:0;perspective:420px;filter:drop-shadow(2px 3px 0 rgba(27,24,21,.22))}
  .vcube .vc-box{position:absolute;left:50%;top:50%;width:76px;height:76px;margin:-38px 0 0 -38px;
    transform-style:preserve-3d;transform:translateZ(-170px)}
  .vcube .vc-face{position:absolute;left:0;top:0;width:76px;height:76px;display:flex;align-items:center;justify-content:center;
    box-sizing:border-box;border:2px solid var(--pen);background:var(--paper2);color:var(--ink);
    font:800 10px var(--fx);letter-spacing:.4px;text-align:center;cursor:pointer;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;transition:background .1s ease,color .1s ease}
  .vcube .vc-face:hover,.vcube .vc-face.press{background:var(--accent);color:var(--paper2)}
  .vcube .vc-front {transform:rotateY(0deg)    translateZ(38px)}
  .vcube .vc-back  {transform:rotateY(180deg)  translateZ(38px)}
  .vcube .vc-right {transform:rotateY(90deg)   translateZ(38px)}
  .vcube .vc-left  {transform:rotateY(-90deg)  translateZ(38px)}
  .vcube .vc-top   {transform:rotateX(90deg)   translateZ(38px)}
  .vcube .vc-bottom{transform:rotateX(-90deg)  translateZ(38px)}

  /* ── section bar (shows when the Section button is on) ── */
  .secbar{position:absolute;z-index:6;right:clamp(14px,3vw,26px);bottom:calc(clamp(16px,3vw,26px) + 64px);
    display:none;align-items:center;gap:8px;padding:10px 14px;max-width:min(92vw,440px)}
  .secbar.on{display:flex;animation:rise .25s both}
  .secbar .sax,.secbar .sflip{flex:0 0 auto;min-width:40px;padding:8px 0;text-align:center;cursor:pointer;
    font:700 13px var(--fx);color:var(--ink);background:var(--paper);border:2px solid var(--pen);border-radius:8px;-webkit-tap-highlight-color:transparent}
  .secbar .sax.ax-on{background:var(--accent);color:var(--paper2)}
  .secbar .sflip.ax-on{background:var(--ink);color:var(--paper2)}
  .secbar input[type=range]{flex:1 1 auto;min-width:110px;-webkit-appearance:none;appearance:none;background:transparent;
    height:44px;cursor:pointer;touch-action:manipulation;margin:0}
  .secbar input[type=range]::-webkit-slider-runnable-track{height:10px;border-radius:5px;background:var(--faint);border:1.5px solid var(--pen)}
  .secbar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:34px;height:34px;margin-top:-14px;
    border-radius:50%;background:var(--accent);border:2px solid var(--pen);box-shadow:var(--pen-sh);cursor:pointer}
  .secbar input[type=range]::-moz-range-track{height:10px;border-radius:5px;background:var(--faint);border:1.5px solid var(--pen)}
  .secbar input[type=range]::-moz-range-thumb{width:34px;height:34px;border-radius:50%;background:var(--accent);border:2px solid var(--pen);cursor:pointer}
  .secbar .sval{flex:0 0 40px;text-align:right;font:700 13px var(--fx);color:var(--ink)}

  /* ── controls (bottom-right): open + AR ── */
  .ctl{position:absolute;z-index:5;right:clamp(14px,3vw,26px);bottom:clamp(16px,3vw,26px);display:flex;gap:10px;animation:rise .7s .42s both}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 17px;cursor:pointer;font-family:var(--fx);
    font-size:14px;font-weight:700;color:var(--ink);background:var(--paper2);border:2px solid var(--pen);
    box-shadow:var(--pen-sh);border-radius:var(--wob2);transition:transform .12s,background .12s;-webkit-tap-highlight-color:transparent}
  .btn:hover{background:#ece3cd} .btn:active{transform:translate(2px,2px);box-shadow:none}
  .btn svg{width:17px;height:17px}
  .btn.on{background:var(--accent);color:var(--paper2)}
  .btn.ar{display:none} .btn.ar.show{display:inline-flex}
  /* red Open-door button, cabinet pages only (เอ๋ 2026-07-09) */
  .btn.openred{background:var(--accent);color:var(--paper2)}
  .btn.openred:hover{background:#9b3225}

  /* ── detail callouts (leader-line labels; orange to match เอ๋'s mockup) ── */
  .co-layer{position:absolute;inset:0;z-index:5;pointer-events:none;overflow:hidden}
  .co-svg{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:visible}
  .co-label{position:absolute;font:700 13px var(--fx);color:#cf5f22;background:var(--paper2);
    border:1.5px solid #cf5f22;border-radius:9px;padding:3px 10px;white-space:nowrap;
    box-shadow:var(--pen-sh);letter-spacing:.02em;max-width:44vw;overflow:hidden;
    text-overflow:ellipsis;will-change:left,top}
  .co-label.co-admin{pointer-events:auto;cursor:pointer}
  .co-label.co-admin:hover{background:#fff}
  .btn.coadd{background:#cf5f22;color:var(--paper2)} .btn.coadd:hover{background:#b34f18}

  /* ── hint ── */
  .hint{position:absolute;z-index:5;left:50%;bottom:clamp(16px,3vw,26px);transform:translateX(-50%);
    font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);
    display:flex;align-items:center;gap:8px;white-space:nowrap;transition:opacity .5s;animation:fade .8s .7s both}
  .hint .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.8s infinite}
  .hint.gone{opacity:0}

  /* ── edit panel (owner only, ?edit=1) ── */
  .edit{position:absolute;z-index:6;top:50%;left:50%;transform:translate(-50%,-50%);padding:22px 24px;
    max-width:92vw;background:var(--paper2);border:2px solid var(--pen);box-shadow:var(--pen-sh);border-radius:var(--wob);display:none}
  .edit.show{display:block;animation:rise .3s both}
  .edit h3{font-size:14px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .edit p{font-size:11px;color:var(--ink-soft);margin-bottom:16px}
  .edit .row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .edit label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:5px}
  .edit input{width:92px;padding:9px 11px;font-family:var(--fx);font-size:16px;font-weight:700;color:var(--ink);
    background:var(--paper);border:2px solid var(--pen);border-radius:8px}
  .edit .acts{display:flex;gap:10px;flex-wrap:wrap}
  .edit .copied{font-size:11px;color:var(--accent);margin-top:10px;font-weight:700;opacity:0;transition:opacity .2s}
  .edit .copied.show{opacity:1}

  /* ── loading ── */
  .load{position:absolute;z-index:9;inset:0;display:grid;place-items:center;background:var(--paper);transition:opacity .6s;text-align:center}
  .load.done{opacity:0;pointer-events:none}
  .load .spin{width:32px;height:32px;border-radius:50%;border:2px solid var(--faint);border-top-color:var(--accent);animation:spin 1s linear infinite;margin:0 auto 16px}
  .load .lt{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft)}
  .load .pct{font-size:11px;color:var(--accent);margin-top:7px;font-weight:700}

  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.6)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
  /* ── phone layout (เอ๋ 2026-07-09 "มือถือดูไม่รู้เรื่อง"): stack from the
        bottom — ctl row pinned at the very bottom, plate full-width above it,
        hint moved to the top; nothing overlaps. ── */
  @media (max-width:560px){
    .top{align-items:center}
    .hint{top:clamp(92px,17vw,122px);bottom:auto}
    /* phone stack: ctl bar at the very bottom, view-cube above it on the left,
       section bar + (admin) copy button above the cube — nothing overlaps */
    .vcube{left:10px;bottom:70px}
    .secbar{left:10px;right:10px;bottom:calc(70px + 182px);max-width:none}
    .dimwrap{left:10px;right:10px;bottom:calc(70px + 182px)}
    .dimcopy.show{width:100%;justify-content:center}
    .dims{width:100%}
    .dims div{flex:1;min-width:0;padding:8px 10px 7px}
    .dims .v .dv{font-size:15px}
    .ctl{left:10px;right:10px;bottom:12px;justify-content:center;flex-wrap:wrap;gap:8px}
  }
</style>
</head>
<body>
<div class="stage">
  <model-viewer id="mv"
    alt="Custom stainless kitchen by Rough Design"
    camera-controls touch-action="pan-y"
    interaction-prompt="none" orientation="0deg -90deg 0deg"
    camera-orbit="22deg 72deg 105%" field-of-view="11deg"
    min-field-of-view="2deg" max-field-of-view="45deg"
    min-camera-orbit="auto 0deg 5%" max-camera-orbit="auto 180deg 2000%"
    exposure="1.1" tone-mapping="neutral" shadow-intensity="0.6" shadow-softness="1" environment-image="neutral"
    ar ar-modes="webxr scene-viewer quick-look" ar-scale="fixed">
    <div slot="progress-bar"></div>
  </model-viewer>
  <div id="panCatch" aria-hidden="true"></div>

  <div class="top">
    <div class="brand">
      <div class="mark"><span>rough</span><b>design</b></div>
      <div class="rule"></div>
      <small>Stainless Kitchen Studio</small>
    </div>
    <div class="proj">
      <div class="name" id="pName">Kitchen</div>
      <div class="tag">Full Kitchen · 3D</div>
    </div>
  </div>

  <div class="dimwrap">
    <!-- Copy-customer-link button removed (เอ๋ 2026-07-15 "ปุ่มนี้ เอาออก").
         dims plate stays hidden (เอ๋ 2026-07-09 "icon ที่แสดงขนาดทั้งหมดเอาออก มันรก");
         dW/dD/dH inputs stay in DOM (set from the model on load, harmless). -->
    <div class="dims card" id="dimsPlate" style="display:none">
      <div><div class="k">Width</div><div class="v"><input class="dv" id="dW" type="number" inputmode="numeric"><span>mm</span></div></div>
      <div><div class="k">Depth</div><div class="v"><input class="dv" id="dD" type="number" inputmode="numeric"><span>mm</span></div></div>
      <div><div class="k">Height</div><div class="v"><input class="dv" id="dH" type="number" inputmode="numeric"><span>mm</span></div></div>
    </div>
  </div>

  <div class="hint" id="hint"><span class="dot"></span>Drag to rotate · pinch to zoom</div>

  <!-- view-cube: tap a face → snap view + dimensions; drag → orbit; 🏠 → home -->
  <div class="vcube" id="vcube" role="group" aria-label="View cube" title="Tap a face to snap that view · drag to orbit">
    <button type="button" class="vc-home" data-view="iso" title="Home view" aria-label="Home view"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 3.2 2.5 11.2h2.3V21h5v-6h4.4v6h5v-9.8h2.3z"/></svg></button>
    <div class="vc-scene">
      <div class="vc-box" id="vcBox">
        <div class="vc-face vc-front"  data-view="front">FRONT</div>
        <div class="vc-face vc-back"   data-view="back">BACK</div>
        <div class="vc-face vc-right"  data-view="right">RIGHT</div>
        <div class="vc-face vc-left"   data-view="left">LEFT</div>
        <div class="vc-face vc-top"    data-view="top">TOP</div>
        <div class="vc-face vc-bottom" data-view="bottom">BOTTOM</div>
      </div>
    </div>
  </div>

  <!-- section bar (visible while Section is on) -->
  <div class="secbar card" id="secBar">
    <button type="button" class="sax" data-ax="x" title="Cut sweeping left-right (X = width)">X</button>
    <button type="button" class="sax" data-ax="y" title="Cut sweeping front-back (Y = depth)">Y</button>
    <button type="button" class="sax" data-ax="z" title="Horizontal cut sweeping bottom-top (Z = height)">Z</button>
    <button type="button" class="sflip" id="secFlip" title="Flip - cut away the other side">&#8644;</button>
    <input type="range" id="secSlider" min="0" max="100" step="1" value="50" aria-label="Section position">
    <span class="sval" id="secVal">50%</span>
  </div>

  <div class="ctl">
    <button class="btn" id="backBtn" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Full kitchen
    </button>
    <button class="btn" id="secBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6.5" r="2.6"/><circle cx="6" cy="17.5" r="2.6"/><path d="M8.2 8 L20.5 19"/><path d="M8.2 16 L20.5 5"/></svg>
      Section
    </button>
    <button class="btn openred" id="openBtn" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h9v16H4z"/><path d="M13 8h7v12h-7"/><path d="M9.5 12h.01"/></svg>
      <span id="openLbl">Open doors</span>
    </button>
    <button class="btn" id="coBtn" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="2.4"/><path d="M9 7h11M4 13h16M4 18h11"/></svg>
      Details
    </button>
    <button class="btn coadd" id="coAddBtn" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Add label
